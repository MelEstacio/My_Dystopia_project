<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinição de Senha</title>
</head>
<body>
     <div id="botopo"> <a href="pag-inicial.html"><button class="home">Início</button></a>
            <a href="minhas-confi.html"><button class="minhas-confi">Minhas Confissões</button></a>
            <a href="comunidade.html"><button class="Comun">Comunidade</button></a>
            <a href="disque-ajuda.html"><button class="Dis">Disque Ajuda</button></a>
            <a href="user_page.html"><button class="User"><img src="assets/images/user_icon.svg" alt=""></button></a>
        </div>
    <section class="reset_password">
        <h1>Redefinir Senha</h1>
        <p>Escolha e responda à pergunta de segurança para redefinir sua senha.</p>
        
        <form id="reset-password-form" action="processar_recuperacao.php" method="post">
            <select name="pergunta_seguranca" id="pergunta_seguranca" class="pergunta_seguranca_select" required>
                <option value="">Selecione uma pergunta de segurança</option>
                <option value="pet">Qual é o nome do seu primeiro animal de estimação?</option>
                <option value="cidade">Qual é o nome da sua cidade natal?</option>
                <option value="amigo">Qual é o nome do seu melhor amigo de infância?</option>
                <option value="filme">Qual é o nome do seu filme favorito?</option>
                <option value="livro">Qual é O nome do seu livro favorito?</option>
                <option value="professor">Qual é o nome do seu professor favorito?</option>
                <option value="esporte">Qual é o nome do seu esporte favorito?</option>
                <option value="cantor">Qual é o nome do seu cantor ou banda favorita?</option>
                <option value="prato">Qual é o nome do seu prato favorito?</option>
            </select>
            
            <input type="text" id="resposta_seguranca" name="resposta_seguranca" placeholder="Digite sua resposta de segurança" required>
            
            <button type="submit">Receber Nova Senha</button>
            <button type="button" onclick="location.href='pag-inicial.html'">Cancelar</button>
            <button type="button" onclick="location.href='user_page.html'">Retornar à Página de Usuário</button>
        </form>
        <p id="message" style="margin-top: 15px; font-weight: bold;"></p>
    </section>

    <script>
        const resetForm = document.getElementById('reset-password-form');
        const messageDisplay = document.getElementById('message');

        resetForm.addEventListener('submit', function(event) {
            event.preventDefault();

            const question = document.getElementById('pergunta_seguranca').value;
            const answer = document.getElementById('resposta_seguranca').value.trim();

            if (!question || !answer) {
                messageDisplay.textContent = 'Por favor, preencha todos os campos.';
                messageDisplay.style.color = 'red';
                return;
            }

            // Envio assíncrono para o PHP
            const formData = new FormData(resetForm);
            fetch('processar_recuperacao.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.text())
            .then(data => console.log('PHP Recuperação:', data))
            .catch(error => console.error('Erro no PHP:', error));

            // Simulação visual local baseada no localStorage
            const storedUser = JSON.parse(localStorage.getItem('myDystopiaUser'));

            if (storedUser && storedUser.securityQuestion === question && storedUser.securityAnswer.toLowerCase() === answer.toLowerCase()) {
                messageDisplay.textContent = `Validação aceita! Sua senha atual é: ${storedUser.password}`;
                messageDisplay.style.color = 'green';
            } else {
                messageDisplay.textContent = 'Combinação de pergunta ou resposta incorreta.';
                messageDisplay.style.color = 'red';
            }
        });
    </script>
</body>
</html>
